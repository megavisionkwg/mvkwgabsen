<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Kerja April 2026 - Megavision Karawang</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#f0c040;--gold-dark:#c9982a;--dark:#0a0a0f;--dark2:#13131e;--dark3:#1c1c2e;--text:#e8e8f0;--text-muted:#8888aa;--green:#22c97a;--red:#ff4d6a;--card:rgba(255,255,255,0.04);--border:rgba(240,192,64,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(240,192,64,0.07) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(240,192,64,0.05) 0%,transparent 55%);pointer-events:none;z-index:0;}
#login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1;padding:20px;}
.logo25-corner{position:fixed;top:18px;right:22px;width:80px;opacity:.92;filter:drop-shadow(0 2px 8px rgba(240,192,64,.3));z-index:100;}
.copyright{position:fixed;bottom:14px;right:18px;font-size:11px;color:var(--text-muted);z-index:100;letter-spacing:.03em;}
.mega-logo-wrap{margin-bottom:36px;animation:fadeDown .8s ease both;}
.mega-logo-wrap img{width:260px;max-width:80vw;filter:drop-shadow(0 4px 24px rgba(240,192,64,.25));}
.login-card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:40px 40px 36px;width:100%;max-width:420px;box-shadow:0 8px 48px rgba(0,0,0,.5),0 0 0 1px rgba(240,192,64,.08);animation:fadeUp .9s ease .1s both;}
.login-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase;}
.login-sub{font-size:12.5px;color:var(--text-muted);text-align:center;margin-bottom:28px;}
.input-group{margin-bottom:16px;}
.input-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.08em;}
.input-group input{width:100%;background:var(--dark3);border:1px solid rgba(240,192,64,.2);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Poppins',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.input-group input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,192,64,.12);}
.input-group input::placeholder{color:#44445a;}
.or-divider{display:flex;align-items:center;gap:10px;margin:6px 0 14px;color:var(--text-muted);font-size:12px;}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:rgba(240,192,64,.15);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;border-radius:10px;padding:13px;color:#1a1000;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:6px;}
.btn-login:hover{opacity:.88;transform:translateY(-1px);}
.error-msg{background:rgba(255,77,106,.12);border:1px solid rgba(255,77,106,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ff7a90;text-align:center;margin-top:14px;display:none;}
#schedule-page{display:none;min-height:100vh;position:relative;z-index:1;padding:28px 20px 60px;}
.sch-header{max-width:1100px;margin:0 auto 22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.sch-header-logo img{width:150px;filter:drop-shadow(0 2px 10px rgba(240,192,64,.2));}
.sch-period{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--gold);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
.sch-name{font-size:24px;font-weight:700;color:var(--text);line-height:1.2;}
.sch-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;}
.meta-badge{background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.25);border-radius:6px;padding:3px 10px;font-size:11.5px;color:var(--gold);font-weight:600;letter-spacing:.04em;}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;max-width:1100px;margin-left:auto;margin-right:auto;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;min-width:110px;}
.stat-num{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--gold);line-height:1;}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;}
.table-wrap{max-width:1100px;margin:0 auto;overflow-x:auto;background:var(--dark2);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.4);}
.sch-table{border-collapse:collapse;width:100%;min-width:700px;}
.sch-table thead tr:first-child th{background:linear-gradient(135deg,#1a1500,#1e1a00);color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 6px 4px;border-bottom:1px solid rgba(240,192,64,.1);text-align:center;white-space:nowrap;}
.sch-table thead tr:last-child th{background:#141410;color:var(--text-muted);font-size:10px;padding:3px 6px 8px;border-bottom:2px solid rgba(240,192,64,.25);text-align:center;}
.sch-table tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
.sch-table tbody tr:hover{background:rgba(240,192,64,.04);}
.sch-table td{padding:9px 6px;text-align:center;font-size:12px;vertical-align:middle;}
.td-no{color:var(--text-muted);font-size:11px;font-weight:600;width:28px;}
.td-nik{font-size:11.5px;color:#aaa8c8;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.05em;white-space:nowrap;text-align:left;padding-left:10px;}
.td-nama{text-align:left;font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;padding-left:4px;}
.td-posisi{font-size:11px;color:var(--gold);font-weight:600;white-space:nowrap;}
.td-os{font-size:10.5px;color:var(--text-muted);white-space:nowrap;}
.badge-p{display:inline-block;background:rgba(34,201,122,.15);color:#22c97a;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:700;min-width:28px;}
.badge-off{display:inline-block;background:rgba(255,77,106,.13);color:#ff6b80;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:700;min-width:28px;}
.td-today{background:rgba(240,192,64,.07)!important;}
.th-today{background:rgba(240,192,64,.18)!important;color:var(--gold)!important;}
.col-today-border{border-left:1px solid rgba(240,192,64,.35);border-right:1px solid rgba(240,192,64,.35);}
.td-total{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#ff6b80;}
.btn-back{background:transparent;border:1px solid rgba(240,192,64,.3);border-radius:8px;color:var(--gold);padding:8px 18px;font-family:'Poppins',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-left:auto;}
.btn-back:hover{background:rgba(240,192,64,.08);}
.today-badge{display:inline-block;background:var(--gold);color:#1a1000;font-size:8px;font-weight:800;border-radius:3px;padding:1px 3px;margin-left:2px;vertical-align:middle;letter-spacing:.04em;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.login-card{padding:28px 20px}.sch-name{font-size:18px}.stat-card{min-width:90px;padding:10px 12px}}
</style>
</head>

DATES.forEach((d,i)=>{const p=d.split(' ');if(parseInt(p[0])===now.getDate()&&now.getMonth()===3&&now.getFullYear()===2026)todayIdx=i;});
function doLogin(){
  const nik=document.getElementById('input-nik').value.trim();
  const nama=document.getElementById('input-nama').value.trim().toLowerCase();
  let found=null;
  for(const emp of EMPLOYEES){
    if(nik&&emp.nik===nik){found=emp;break;}
    if(nama&&nama.length>=2&&emp.nama.toLowerCase().includes(nama)){found=emp;break;}
  }
  document.getElementById('error-msg').style.display=found?'none':'block';
  if(found)showSchedule(found);
}
document.getElementById('input-nik').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('input-nama').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
function showSchedule(emp){
  document.getElementById('login-page').style.display='none';
  document.getElementById('schedule-page').style.display='block';
  window.scrollTo(0,0);
  document.getElementById('sch-nama').textContent=emp.nama;
  document.getElementById('sch-nik-badge').textContent=emp.nik?'NIK: '+emp.nik:'NIK: -';
  document.getElementById('sch-posisi-badge').textContent=emp.posisi||'-';
  document.getElementById('sch-os-badge').textContent=emp.os?'OS: '+emp.os:'-';
  const tp=emp.schedule.filter(s=>s==='P').length;
  const to=emp.schedule.filter(s=>s==='OFF').length;
  document.getElementById('stats-row').innerHTML=`<div class="stat-card"><div class="stat-num">${tp}</div><div class="stat-label">Hari Kerja</div></div><div class="stat-card"><div class="stat-num">${to}</div><div class="stat-label">Hari OFF</div></div><div class="stat-card"><div class="stat-num">${emp.schedule.length}</div><div class="stat-label">Total Hari</div></div>`;
  let hh='<tr>';
  hh+='<th rowspan="2" style="width:28px">No</th>';
  hh+='<th rowspan="2" style="text-align:left;padding-left:10px;min-width:80px">NIK</th>';
  hh+='<th rowspan="2" style="text-align:left;min-width:140px">Nama</th>';
  hh+='<th rowspan="2">Posisi</th>';
  hh+='<th rowspan="2">OS</th>';
  DAYS.forEach((d,i)=>{const it=(i===todayIdx);hh+=`<th class="${it?'th-today col-today-border':''}" style="min-width:34px">${d}${it?'<span class="today-badge">HARI INI</span>':''}</th>`;});
  hh+='<th rowspan="2" style="min-width:42px">OFF</th></tr><tr>';
  DATES.forEach((d,i)=>{const it=(i===todayIdx);hh+=`<th class="${it?'th-today col-today-border':''}">${d}</th>`;});
  hh+='</tr>';
  document.getElementById('table-head').innerHTML=hh;
  let bb=`<tr><td class="td-no">${emp.no}</td><td class="td-nik">${emp.nik||'-'}</td><td class="td-nama">${emp.nama}</td><td class="td-posisi">${emp.posisi}</td><td class="td-os">${emp.os||'-'}</td>`;
  emp.schedule.forEach((s,i)=>{const it=(i===todayIdx);bb+=`<td class="${it?'td-today col-today-border':''}">${s==='P'?'<span class="badge-p">P</span>':'<span class="badge-off">OFF</span>'}</td>`;});
  bb+=`<td class="td-total">${emp.total_off}</td></tr>`;
  document.getElementById('table-body').innerHTML=bb;
}
function goBack(){
  document.getElementById('schedule-page').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('input-nik').value='';
  document.getElementById('input-nama').value='';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
